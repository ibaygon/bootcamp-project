<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 3.3 Añade un título principal de la aplicación -->
    <title>TaskFlow</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
</head>

<!-- 9.3 Implementa modo oscuro usando clases dark: (Esta en todo el codigo no solo aqui) -->
<body class="min-h-screen flex flex-col bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100">

   <header class="bg-blue-600 text-white py-6 shadow">
      <div class="w-[80%] md:w-[70%] mx-auto flex items-center justify-between relative">
        <h1 class="text-3xl font-bold">TaskFlow</h1>

        <!-- 9.4 Añade un botón que permita activar o desactivar el modo oscuro -->
        <button 
            id="toggle-dark" 
            class="bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-gray-100 px-3 py-1 rounded"
        >
            🌙
        </button>
      </div>
   </header>
   <!-- prueba vercel --> 

    <!-- 3.4 Crea un formulario para añadir nuevas tareas -->
    <main class="p-6 flex-1">
      <div class="w-[80%] md:w-[70%] mx-auto space-y-6">

        <!-- 3.6 Crea un panel lateral para mostrar estadísticas (total, completadas y pendientes) -->
        <aside class="w-full bg-white dark:bg-gray-800 p-6 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Estadísticas</h2>
            <p>Total: <span id="total">0</span></p>
            <p>Completadas: <span id="completed">0</span></p>
            <p>Pendientes: <span id="pending">0</span></p>
        </aside>

        <section id="formulario" class="w-full bg-white dark:bg-gray-800 p-6 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Añadir nueva tarea</h2>

            <form id="task-form" class="flex flex-wrap gap-4 items-center">
                <label for="task-input" class="w-full font-medium">Nombre de la tarea:</label>

                <input 
                    type="text" 
                    id="task-input" 
                    name="task" 
                    required
                    class="flex-1 min-w-[200px] px-3 py-2 border rounded dark:bg-gray-700 dark:border-gray-600"
                    placeholder="Escribe una nueva tarea..."
                >

                <label for="task-priority" class="w-full font-medium">Prioridad:</label>
                <select
                    id="task-priority"
                    name="priority"
                    class="px-3 py-2 border rounded dark:bg-gray-700 dark:border-gray-600"
                >
                    <option value="alta">Alta</option>
                    <option value="media" selected>Media</option>
                    <option value="baja">Baja</option>
                </select>

                <button 
                    type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                >
                    Agregar
                </button>
            </form>
        </section>

        <!-- 3.5 Añade una lista donde se mostrarán las tareas -->
        <section id="lista-tareas" class="w-full bg-white dark:bg-gray-800 p-6 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Lista de tareas</h2>

            <div id="filters" class="flex gap-3 mb-4">
                <button data-filter="all" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">Todas</button>
                <button data-filter="pending" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">Activas</button>
                <button data-filter="completed" class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded">Completadas</button>
            </div>

            <div class="flex flex-col md:flex-row gap-3 mb-4">
                <input 
                    type="text" 
                    id="search" 
                    placeholder="Buscar tareas..."
                    class="flex-1 px-3 py-2 border rounded dark:bg-gray-700 dark:border-gray-600"
                >
                <select
                    id="priority-filter"
                    class="px-3 py-2 border rounded dark:bg-gray-700 dark:border-gray-600 md:w-[220px]"
                >
                    <option value="all" selected>Todas las prioridades</option>
                    <option value="alta">Solo alta</option>
                    <option value="media">Solo media</option>
                    <option value="baja">Solo baja</option>
                </select>
                <select
                    id="sort"
                    class="px-3 py-2 border rounded dark:bg-gray-700 dark:border-gray-600 md:w-[220px]"
                >
                    <option value="date" selected>Ordenar por fecha</option>
                    <option value="name">Ordenar por nombre</option>
                    <option value="priority">Ordenar por prioridad</option>
                </select>
            </div>

            <div class="flex flex-col md:flex-row gap-3 mb-4">
                <button id="complete-all" class="flex-1 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    Completar todas
                </button>

                <button id="delete-completed" class="flex-1 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                    Eliminar completadas
                </button>
            </div>

            <ul id="tasks" class="space-y-3"></ul>

            <!-- 3.7 Define una plantilla (template) o estructura base para cada tarea -->
            <template id="task-template">
                <li class="task flex items-center gap-3 bg-gray-100 dark:bg-gray-700 p-3 rounded shadow transition-all duration-300 ease-out opacity-0 translate-y-2">
                    <input type="checkbox" class="task-check">
                    <span class="task-text flex-1"></span>
                    <span class="task-priority px-2 py-1 text-xs font-semibold rounded"></span>
                    <button class="delete-btn px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">Eliminar</button>
                </li>
            </template>
        </section>
        
      </div>
    </main>

    <footer class="text-center py-4 text-gray-600 dark:text-gray-400">
        <p>2026 TaskFlow</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
